<!DOCTYPE html>
<html>
<head>
    <title>Life Project</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
<header>
    <h2>Dream Life</h2>

    <div class="header-box">
        <span>Amount: ₹ <span id="amount"></span></span>
        <span>Time: <span id="time"></span></span>
        <span>Date: <span id="date"></span></span>
    </div>
</header>

<hr>

<div class="top">
    <div class="character-section">
        <img id="char-img" width="200">
        <h3 id="char-info"></h3>
    </div>

    <div class="food-section">
        <h3>Food</h3>
        <button id="breakfast" onclick="eatMeal(30,'breakfast')">Breakfast</button>
        <button id="lunch" onclick="eatMeal(40,'lunch')">Lunch</button>
        <button id="dinner" onclick="eatMeal(50,'dinner')">Dinner</button>
    </div>
</div>

<hr>

<!-- earn(tasks)-->
<div id="home" class="tab active">
    <div class="task-header">
        <h3>Earn Tasks</h3>
        <button id="add-task-btn" onclick="showTaskForm()">+</button>
    </div>

    <!-- Hidden inline task form -->
    <div id="task-form" style="display:none; margin-top:10px;">
        <input type="text" id="task-name" placeholder="Task Name">
        <input type="number" id="task-reward" placeholder="Reward Amount">
        <button onclick="addTaskInline()">Add</button>
        <button onclick="hideTaskForm()">Cancel</button>
    </div>
    <div id="task-list"></div>
</div>

<div id="study" class="tab">
    <h3>Study</h3>
    <button onclick="study('1st Class')">1st Class</button>
    <button onclick="study('2nd Class')">2nd Class</button>
    <button onclick="study('3rd Class')">3rd Class</button>
</div>

<div id="shop" class="tab">
    <h3>Shop</h3>
    <button onclick="showCategory('food')">Food</button>
    <button onclick="showCategory('dress')">Dress</button>
    <button onclick="showCategory('things')">Things</button>
    <button onclick="showCategory('vehicle')">Vehicles</button>
    <div id="shop-items"></div>
</div>

<div id="work" class="tab">
    <h3>Work</h3>
    <button onclick="startJob(500)">Painter Job ₹500</button>
    <button onclick="startJob(800)">Coder Job ₹800</button>
    <button onclick="startJob(1000)">Teacher Job ₹1000</button>
</div>

<div id="profile" class="tab">
    <h3>Profile</h3>
    <p>Name: {{ name }}</p>
    <p>Age: {{ age }}</p>
    <p>Study: None</p>
    <p>Skills: None</p>
</div>

<div class="bottom-nav">
    <button onclick="openTab('home')">Home</button>
    <button onclick="openTab('study')">Study</button>
    <button onclick="openTab('shop')">Shop</button>
    <button onclick="openTab('work')">Work</button>
    <button onclick="openTab('profile')">Profile</button>
</div>

<script>
    // Load values from localStorage
    let amount = 1000;  // starting amount
    let name = localStorage.getItem("name") || "Uma Devi";
    let age = localStorage.getItem("age") || 20;
    let character = localStorage.getItem("character") || "girl";

    // Set character image and info
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("amount").innerText = amount;
        document.getElementById("char-info").innerText = `${name}\nAge: ${age}`;
        // document.getElementById("profile-name").innerText = name;
        // document.getElementById("profile-age").innerText = age;

        let charImg = document.getElementById("char-img");
        if(character === "girl") charImg.src = "static/girl.png";
        else if(character === "boy") charImg.src = "https://png.pngtree.com/png-vector/20241010/ourmid/pngtree-a-helpless-boy-begging-png-image_14040253.png";
        else if(character === "oldwoman") charImg.src = "https://thumbs.dreamstime.com/b/vsai-sad-elderly-homeless-woman-wearing-orange-scarf-sitting-sidewalk-begging-money-vsai-elderly-homeless-woman-begging-415896837.jpg";
        else if(character === "beggar") charImg.src = "https://img.freepik.com/premium-vector/poor-sad-beggar-cartoon-vector-clip-art-image_1080480-105130.jpg?semt=ais_rp_50_assets&w=740&q=80";

        // Show default tab
        openTab("home");
    });
</script>

<script>
// Food System (3 meals / day)
function eatMeal(price, meal){
    if(amount >= price){
        amount -= price;
        document.getElementById("amount").innerText = amount;
        document.getElementById(meal).disabled = true;
    }
    else{
        alert("Not enough money");
    }
}

// Live Time
setInterval(function(){
    let now = new Date();
    document.getElementById("time").innerText = now.toLocaleTimeString();
    document.getElementById("date").innerText = now.toLocaleDateString();
},1000);

// Bottom Navigation
function openTab(tab){
    let tabs = document.querySelectorAll(".tab");
    tabs.forEach(t => t.style.display = "none");
    document.getElementById(tab).style.display = "block";
}

// Shop System
const shopData = {
food:[
    {name:"Idli",price:20},
    {name:"Dosa",price:30},
    {name:"Biryani",price:120},
    {name:"Cake",price:80}
    ],

dress:[
    {name:"Tshirt",price:200},
    {name:"Jeans",price:500},
    {name:"Saree",price:800}
    ],

things:[
    {name:"Phone",price:8000},
    {name:"Laptop",price:50000},
    {name:"Watch",price:1500}
    ],

vehicle:[
    {name:"Cycle",price:3000},
    {name:"Bike",price:80000},
    {name:"Car",price:500000}
    ]
};

function showCategory(category){
    let items = shopData[category];
    let html = "";
    items.forEach(item => {
        html += `
        <div class="shop-item"> 
            ${item.name} ₹${item.price}
            <button onclick="buyItem(${item.price})">Buy</button>
        </div>`;
    });
    document.getElementById("shop-items").innerHTML = html;
}

// Buy Item
function buyItem(price){
    if(amount >= price){
        amount -= price;
        document.getElementById("amount").innerText = amount;
        alert("Item purchased!");
    }
    else{
        alert("Not enough money!");
    }
}

// Reset Meals Next Day
function resetMeals(){
    document.getElementById("breakfast").disabled = false;
    document.getElementById("lunch").disabled = false;
    document.getElementById("dinner").disabled = false;
}
// reset after 24 hours
setTimeout(resetMeals, 86400000);

// Study & Work
function study(className){alert("You are now studying: " + className);}
function startJob(salary){alert("You started a job. Salary: ₹" + salary);}

// Task System
function showTaskForm() {
    document.getElementById("task-form").style.display = "block";
    document.getElementById("add-task-btn").disabled = true;
}
function hideTaskForm() {
    document.getElementById("task-form").style.display = "none";
    document.getElementById("add-task-btn").disabled = false;
}
function addTaskInline() {
    let taskName = document.getElementById("task-name").value.trim();
    let reward = parseInt(document.getElementById("task-reward").value);
    if (!taskName || isNaN(reward)) {
        alert("Please enter valid task name and reward!");
        return;
    }
    let taskList = document.getElementById("task-list");
    let task = document.createElement("div");
    task.className = "task-item";
    task.innerHTML = `
        <span>${taskName} ₹${reward}</span>
        <div>
            <button class="complete-btn">✔</button>
            <button class="fail-btn">❌</button>
        </div>
    `;
    taskList.appendChild(task);
    task.querySelector(".complete-btn").addEventListener("click", function() {
        amount += reward;
        document.getElementById("amount").innerText = amount;
        task.remove();
    });
    task.querySelector(".fail-btn").addEventListener("click", function() {
        task.remove();
    });

    // Reset & hide form
    document.getElementById("task-name").value = "";
    document.getElementById("task-reward").value = "";
    hideTaskForm();
}
</script>

</body>
</html>
